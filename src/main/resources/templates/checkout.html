<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Оформление заказа</h1>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/catalog">Каталог</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <form id="checkout-form">
            <div class="form-section">
                <h3>Контактная информация</h3>

                <div class="form-group">
                    <label for="customerName">ФИО *</label>
                    <input type="text" id="customerName" name="customerName" required>
                </div>

                <div class="form-group">
                    <label for="customerEmail">Email *</label>
                    <input type="email" id="customerEmail" name="customerEmail" required>
                </div>

                <div class="form-group">
                    <label for="customerPhone">Телефон *</label>
                    <input type="tel" id="customerPhone" name="customerPhone" required>
                </div>
            </div>

            <div class="form-section">
                <h3>Способ получения</h3>

                <div class="form-group">
                    <label>
                        <input type="radio" name="deliveryType" value="COURIER" checked>
                        Курьером
                    </label>
                    <label>
                        <input type="radio" name="deliveryType" value="PICKUP">
                        Самовывоз (ПВЗ)
                    </label>
                </div>

                <div id="courier-fields" class="delivery-fields">
                    <div class="form-group">
                        <label for="deliveryAddress">Адрес доставки *</label>
                        <input type="text" id="deliveryAddress" name="deliveryAddress">
                    </div>
                </div>

                <div id="pickup-fields" class="delivery-fields" style="display: none;">
                    <div class="form-group">
                        <label for="pickupPointId">Пункт самовывоза *</label>
                        <select id="pickupPointId" name="pickupPointId">
                            <option value="p1">МТС, ул. Тверская, 7</option>
                            <option value="p2">МТС, пр. Мира, 26</option>
                            <option value="p3">МТС, Ленинский пр., 68</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Ваш заказ</h3>
                <div id="order-items" class="order-items"></div>
                <div class="order-total">
                    <strong>Итого: <span id="order-total">0</span> ₽</strong>
                </div>
            </div>

            <div class="form-section">
                <h3>Способ оплаты</h3>

                <div class="form-group">
                    <label>
                        <input type="radio" name="paymentMethod" value="card" checked>
                        Банковской картой
                    </label>
                    <label>
                        <input type="radio" name="paymentMethod" value="sbp">
                        СБП
                    </label>
                    <label>
                        <input type="radio" name="paymentMethod" value="installments">
                        Рассрочка
                    </label>
                </div>

                <div id="card-details" class="payment-details">
                    <div class="form-group">
                        <label for="cardNumber">Номер карты</label>
                        <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cardExpiry">Срок действия</label>
                            <input type="text" id="cardExpiry" name="cardExpiry" placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label for="cardCvv">CVV</label>
                            <input type="text" id="cardCvv" name="cardCvv" placeholder="123">
                        </div>
                    </div>
                </div>

                <div id="sbp-details" class="payment-details" style="display: none;">
                    <div class="form-group">
                        <label for="phoneNumber">Номер телефона</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+7 (999) 123-45-67">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Оформить заказ</button>
            </div>
        </form>

        <div id="order-result" style="display: none;" class="order-result">
            <h3>Заказ оформлен!</h3>
            <p>Номер заказа: <span id="result-order-number"></span></p>
            <p>Статус: <span id="result-status"></span></p>
            <p>Следить за заказом можно по <a href="#" id="result-link">ссылке</a></p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Интернет-магазин МТС</p>
        </div>
    </footer>

    <script src="/js/checkout.js"></script>
</body>
</html>
