<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Панель Бухгалтера (MVP 1C)</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .accounting-container { max-width: 1200px; margin: 2rem auto; padding: 2rem; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; color: #ffffff; }
        .data-table th, .data-table td { border: 1px solid rgba(255,255,255,0.1); padding: 1rem; text-align: left; }
        .data-table th { background-color: rgba(227, 6, 19, 0.2); color: #e30613; }
        .doc-card { border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; margin-bottom: 1rem; border-radius: 12px; background: rgba(255,255,255,0.05); color: #cccccc; }
        h1, h2 { color: #ffffff; }
        a { color: #e30613; text-decoration: none; }
        .doc-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .doc-actions a { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1rem; border-radius: 10px; background: rgba(227, 6, 19, 0.12); border: 1px solid rgba(227, 6, 19, 0.28); }
        .doc-meta { color: #9da3b5; font-size: 0.95rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="accounting-container">
        <h1>Панель Бухгалтера (MVP 1C)</h1>
        <p><a href="/">← На главную</a></p>

        <section>
            <h2>Главная книга (Проводки)</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Заказ</th>
                        <th>Дебет</th>
                        <th>Кредит</th>
                        <th>Сумма</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${ledger}">
                        <td th:text="${#temporals.format(entry.date, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${entry.orderNumber}"></td>
                        <td th:text="${entry.accountDebit}"></td>
                        <td th:text="${entry.accountCredit}"></td>
                        <td th:text="${entry.amount + ' ₽'}"></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section>
            <h2>Реестр документов</h2>
            <div th:each="doc : ${documents}" class="doc-card">
                <strong th:text="${(doc.title != null ? doc.title : doc.docType) + ' по заказу ' + doc.orderNumber}"></strong>
                <div class="doc-meta" th:text="${'Дата: ' + #temporals.format(doc.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                <div class="doc-meta" th:text="${'Файл: ' + (doc.fileName != null ? doc.fileName : 'не загружен') + ' · ' + (doc.fileSize != null ? #numbers.formatDecimal(doc.fileSize / 1024.0, 0, 1) : '0') + ' КБ'}"></div>
                <hr>
                <pre th:text="${doc.content}"></pre>
                <div class="doc-actions" th:if="${doc.objectKey != null}">
                    <a th:href="@{/accounting/documents/{id}/view(id=${doc.id})}" target="_blank">Просмотреть PDF</a>
                    <a th:href="@{/accounting/documents/{id}/download(id=${doc.id})}">Скачать PDF</a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
