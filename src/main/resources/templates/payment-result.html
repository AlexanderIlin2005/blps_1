<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус платежа - ElectroGlass</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="/" class="logo"><span>Electro</span>Glass</a>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/catalog">Каталог</a></li>
                    <li><a href="/cart">Корзина <span id="cart-count-nav" class="status-pill" style="display: none;">0</span></a></li>
                    <li sec:authorize="isAuthenticated()"><a href="/profile">Профиль</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" class="btn-link">Выйти</button>
                        </form>
                    </li>
                    <li sec:authorize="!isAuthenticated()"><a href="/login">Вход</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="animate" style="max-width: 600px; margin: 4rem auto; text-align: center;">
            <div id="payment-status-card" class="card glass">
                <div id="status-icon" style="font-size: 5rem; margin-bottom: 2rem;">⏳</div>
                <h2 id="status-title" class="section-title" style="font-size: 2rem; margin-bottom: 1rem;">Обработка заказа</h2>
                <p id="status-text" style="color: var(--text-dim); margin-bottom: 2.5rem;">
                    Мы связываемся с платежной системой ЮKassa...
                </p>

                <div class="info-backing" style="padding: 1.5rem; text-align: left; margin-bottom: 2.5rem;">
                    <div class="info-row" style="padding: 0.75rem 0;">
                        <span class="info-label">Заказ</span>
                        <span class="info-value" th:text="${orderNumber}"></span>
                    </div>
                    <div class="info-row" style="padding: 0.75rem 0; border: none;">
                        <span class="info-label">Сумма</span>
                        <span class="info-value" th:text="${order != null ? #numbers.formatDecimal(order.total, 0, 0) + ' ₽' : '...' }"></span>
                    </div>
                </div>

                <!-- Кнопка ручного перехода (скрыта по умолчанию) -->
                <div id="manual-pay-container" style="display: none; margin-bottom: 2.5rem; padding: 1rem; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border);">
                    <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem;">Автоматический переход не сработал?</p>
                    <a id="manual-pay-btn" href="#" class="btn btn-secondary" style="width: 100%; border-color: var(--text-dim); color: var(--text-dim);">Перейти к оплате вручную</a>
                </div>

                <div id="status-loader" style="margin-bottom: 2rem;">
                    <div style="width: 40px; height: 40px; border: 4px solid var(--glass-border); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                </div>

                <div id="action-buttons" style="display: none; gap: 1rem;">
                    <a href="/orders" class="btn btn-primary" style="flex: 1;">К моим заказам</a>
                    <a href="/catalog" class="btn btn-secondary" style="flex: 1;">В каталог</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ElectroGlass. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

    <script th:inline="javascript">
        const orderNumber = [[${orderNumber}]];
        const urlParams = new URLSearchParams(window.location.search);
        const flow = urlParams.get('flow');
        let hasAutoRedirected = false;
        let attempts = 0;

        function checkStatus() {
            if (!orderNumber) return;
            
            fetch(`/api/orders/${orderNumber}`)
                .then(res => res.json())
                .then(order => {
                    const icon = document.getElementById('status-icon');
                    const title = document.getElementById('status-title');
                    const text = document.getElementById('status-text');
                    const loader = document.getElementById('status-loader');
                    const buttons = document.getElementById('action-buttons');
                    const manualPay = document.getElementById('manual-pay-container');
                    const manualBtn = document.getElementById('manual-pay-btn');


                    if (order.status === 'PAYMENT_PROCESSING' || order.status === 'CHECKOUT') {
                        if (order.paymentConfirmationUrl) {
                            manualPay.style.display = 'block';
                            manualBtn.href = order.paymentConfirmationUrl;
                            text.textContent = 'Ожидаем оплату заказа. Если страница не открылась автоматически, нажмите на кнопку ниже.';
                            

                            if (flow === 'creation' && !hasAutoRedirected) {
                                hasAutoRedirected = true;
                                setTimeout(() => {
                                    window.location.href = order.paymentConfirmationUrl;
                                }, 1500);
                            }
                        } else {
                            text.textContent = 'Генерируем ссылку на оплату в ЮKassa...';
                        }
                    }


                    if (order.status === 'PAID' || order.status === 'PROCESSING' || order.status === 'SHIPPED' || order.status === 'DELIVERED' || order.status === 'COMPLETED') {
                        icon.textContent = '✅';
                        title.textContent = 'Оплата принята!';
                        text.textContent = 'Ваш заказ успешно оплачен и уже передается на сборку. Спасибо за покупку!';
                        loader.style.display = 'none';
                        manualPay.style.display = 'none';
                        buttons.style.display = 'flex';
                        
                        if (urlParams.get('clearCart') === 'true') {
                            localStorage.removeItem('cart');
                            localStorage.removeItem('cartTotal');
                        }
                        return;
                    } 
                    
                    if (order.status === 'CANCELLED') {
                        icon.textContent = '❌';
                        title.textContent = 'Заказ отменен';
                        text.textContent = 'К сожалению, платеж не прошел или заказ был отменен.';
                        loader.style.display = 'none';
                        manualPay.style.display = 'none';
                        buttons.style.display = 'flex';
                        return;
                    }


                    attempts++;
                    if (attempts < 100) {
                        setTimeout(checkStatus, 3000);
                    } else {
                        loader.style.display = 'none';
                        text.textContent = 'Проверка статуса занимает слишком много времени. Вы можете закрыть страницу и проверить статус в личном кабинете позже.';
                        buttons.style.display = 'flex';
                    }
                })
                .catch(err => {
                    console.error('Status check failed', err);
                    setTimeout(checkStatus, 5000);
                });
        }

        checkStatus();

        function updateNavCart(){
            const c=JSON.parse(localStorage.getItem("cart"))||[];
            const b=document.getElementById("cart-count-nav");
            if(b){
                const count=c.reduce((s,i)=>s+i.quantity,0);
                if(count>0){b.style.display="inline-block";b.textContent=count;}
                else{b.style.display="none";}
            }
        }
        document.addEventListener("DOMContentLoaded",updateNavCart);
    </script>
</body>
</html>
