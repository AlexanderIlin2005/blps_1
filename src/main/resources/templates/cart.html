<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - ElectroGlass</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="/" class="logo"><span>Electro</span>Glass</a>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/catalog">Каталог</a></li>
                    <li><a href="/cart" class="nav-active">Корзина <span id="cart-count-nav" class="status-pill" style="display: none;">0</span></a></li>
                    <li sec:authorize="isAuthenticated()"><a href="/profile">Профиль</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" class="btn-link">Выйти</button>
                        </form>
                    </li>
                    <li sec:authorize="!isAuthenticated()"><a href="/login">Вход</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="animate">
            <h2 class="section-title">Ваша корзина</h2>

            <div id="cart-empty" class="card glass" style="display: none; text-align: center; padding: 5rem;">
                <div style="font-size: 5rem; margin-bottom: 2rem;">🛒</div>
                <p style="font-size: 1.2rem; color: var(--text-dim); margin-bottom: 2rem;">В корзине пока пусто</p>
                <a href="/catalog" class="btn btn-primary">Перейти к покупкам</a>
            </div>

            <div id="cart-content" style="display: none;">
                <div class="card glass" style="padding: 0; overflow: hidden; margin-bottom: 2rem;">
                    <table class="glass-table" style="margin: 0; border-spacing: 0;">
                        <thead>
                            <tr style="background: rgba(255,255,255,0.02);">
                                <th style="padding-left: 2rem;">Товар</th>
                                <th>Цена</th>
                                <th>Кол-во</th>
                                <th>Сумма</th>
                                <th style="padding-right: 2rem;"></th>
                            </tr>
                        </thead>
                        <tbody id="cart-items-body">
                            <!-- Items will be injected here -->
                        </tbody>
                    </table>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 2rem; align-items: flex-start;">
                    <div class="card glass" style="min-width: 350px; background: var(--bg-surface);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                            <span style="color: var(--text-dim);">Итого к оплате:</span>
                            <span id="cart-total-price" style="font-size: 1.8rem; font-weight: 800; color: var(--primary-color);">0 ₽</span>
                        </div>
                        
                        <div sec:authorize="isAuthenticated()">
                            <a href="/checkout" class="btn btn-primary" style="width: 100%; padding: 1.2rem;">Оформить заказ</a>
                        </div>
                        <div sec:authorize="!isAuthenticated()">
                            <p style="color: var(--text-dim); font-size: 0.85rem; text-align: center; margin-bottom: 1rem;">Для оформления заказа необходимо войти</p>
                            <a href="/login?redirect=checkout" class="btn btn-secondary" style="width: 100%;">Войти и оформить</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ElectroGlass. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const emptyEl = document.getElementById('cart-empty');
            const contentEl = document.getElementById('cart-content');
            const body = document.getElementById('cart-items-body');
            const totalEl = document.getElementById('cart-total-price');
            const navBadge = document.getElementById('cart-count-nav');

            if (cart.length === 0) {
                emptyEl.style.display = 'block';
                contentEl.style.display = 'none';
                if(navBadge) navBadge.style.display = 'none';
                return;
            }

            emptyEl.style.display = 'none';
            contentEl.style.display = 'block';
            
            const totalCount = cart.reduce((s, i) => s + i.quantity, 0);
            if(navBadge) {
                navBadge.style.display = 'inline-block';
                navBadge.textContent = totalCount;
            }

            body.innerHTML = cart.map((item, index) => {
                const chars = Array.from(item.name || "📦 Товар");
                const emoji = /\p{Emoji}/u.test(chars[0]) ? chars[0] : '📦';
                const name = /\p{Emoji}/u.test(chars[0]) ? chars.slice(1).join('').trim() : item.name;

                return `
                    <tr>
                        <td style="padding-left: 2rem;">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div style="font-size: 2rem; background: rgba(255,255,255,0.02); padding: 0.5rem; border-radius: 12px;">
                                    ${emoji}
                                </div>
                                <div>
                                    <div style="font-weight: 600;">${name}</div>
                                    <small style="color: var(--text-dim); font-size: 0.75rem;">SKU: ${item.sku}</small>
                                </div>
                            </div>
                        </td>
                        <td>${(item.price || 0).toLocaleString()} ₽</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <button onclick="updateQty(${index}, -1)" class="nav-btn" style="padding: 0.2rem 0.6rem;">-</button>
                                <span style="font-weight: 600; min-width: 20px; text-align: center;">${item.quantity}</span>
                                <button onclick="updateQty(${index}, 1)" class="nav-btn" style="padding: 0.2rem 0.6rem;">+</button>
                            </div>
                        </td>
                        <td style="font-weight: 700; color: var(--primary-color);">${((item.price || 0) * (item.quantity || 0)).toLocaleString()} ₽</td>
                        <td style="padding-right: 2rem; text-align: right;">
                            <button onclick="removeItem(${index})" class="nav-btn" style="color: var(--primary-color);">✕</button>
                        </td>
                    </tr>
                `;
            }).join('');

            const total = cart.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 0)), 0);
            totalEl.textContent = total.toLocaleString() + ' ₽';
            localStorage.setItem('cartTotal', total);
        }

        function updateQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart[index].quantity += delta;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
