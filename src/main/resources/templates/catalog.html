<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Каталог товаров</h1>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/catalog">Каталог</a></li>
                    <li sec:authorize="!isAuthenticated()"><a href="/login">Вход</a></li>
                    <li sec:authorize="!isAuthenticated()"><a href="/register">Регистрация</a></li>
                    <li sec:authorize="isAuthenticated()"><a href="/profile">Личный кабинет</a></li>
                    <li sec:authorize="isAuthenticated()"><a href="/orders">Мои заказы</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form action="#" th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" class="btn-link">Выйти</button>
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="cart-container">
            <h2>Корзина</h2>
            <div id="cart-items" class="cart-items">
                <p>Корзина пуста</p>
            </div>
            <div id="cart-total" class="cart-total"></div>
            <a href="/checkout" class="btn btn-primary" id="checkout-btn" style="display: none;" sec:authorize="isAuthenticated()">Оформить заказ</a>
            <a href="/login" class="btn btn-primary" id="login-to-checkout" style="display: none;" sec:authorize="!isAuthenticated()">Войти для оформления</a>
        </div>

        <h2>Товары</h2>
        <div id="products" class="products-grid products-grid-3col">

        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Интернет-магазин</p>
        </div>
    </footer>

    <script src="/js/catalog.js"></script>
</body>
</html>
