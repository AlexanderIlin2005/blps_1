<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Регистрация</h1>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/catalog">Каталог</a></li>
                    <li><a href="/login">Вход</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-form">
            <h2>Создание аккаунта</h2>

            <div th:if="${error}" class="error-message" th:text="${error}"></div>

            <form action="#" th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label for="username">Имя пользователя *</label>
                    <input type="text" id="username" th:field="*{username}" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>

                <div class="form-group">
                    <label for="fullName">Полное имя</label>
                    <input type="text" id="fullName" th:field="*{fullName}">
                </div>

                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" th:field="*{phone}">
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" th:field="*{password}" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтверждение пароля *</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                </div>
            </form>

            <p class="auth-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </main>
</body>
</html>
