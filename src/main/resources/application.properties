# Server configuration
server.port=8082

# Database configuration (WildFly JNDI)
spring.datasource.jndi-name=java:/PostgresDS

# Hibernate JTA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.WildFlyStandAloneJtaPlatform
spring.jpa.properties.hibernate.transaction.coordinator_class=jta
spring.jpa.properties.hibernate.current_session_context_class=jta
spring.jpa.properties.hibernate.jdbc.allow_set_autocommit=false

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=1000ms
spring.data.redis.connect-timeout=1000ms

# YooMoney (ЮKassa) configuration
yoomoney.shop.id=${YOOMONEY_SHOP_ID:1298167}
yoomoney.secret.key=${YOOMONEY_SECRET_KEY:test_5nbVeTt_KxPrJrPaByH10WmUl1iSdvbmffajwdwDy_s}
yoomoney.api.url=https://api.yookassa.ru/v3/payments
yoomoney.return.url=https://gitea.timoapp.tech/payment-result

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Allow circular references
spring.main.allow-circular-references=true

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.ru.sashil=DEBUG

# ========== ActiveMQ Configuration ==========
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.pool.enabled=false
spring.jms.pub-sub-domain=false

# Queue names
fulfillment.queue.name=fulfillment.queue
# ============================================
delivery.queue.name=delivery.queue

